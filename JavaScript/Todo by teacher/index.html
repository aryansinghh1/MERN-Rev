<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Todo App</h1>

      <section>
        <form action="">

            <h2>Add Todo</h2>
           <div>
             <label for="title">Title</label>
            <input type="text" placeholder="Enter Title" id="title" />
           </div>
            <div>
                <label for="desc">Description</label>
            <textarea name="" id="desc" placeholder="Enter description"></textarea>
            </div>
            <button type="submit">Add</button>
        </form>
      </section>

      <section>
        <h2>Todo List</h2>
        <ul></ul>
      </section>

    </main>
  </body>
</html>
