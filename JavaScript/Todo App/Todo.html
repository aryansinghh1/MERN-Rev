<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1 style="text-align: center;">Todo App</h1>
    <h2 style="text-align: center;">Add Todo</h2>
    <div class="add">
      <form action="">
        <p style="font-size: 20px;">Title:-</p>
        <input style="width: 400px;" type="text" name="title" />
        <p style="font-size: 20px;">Description:-</p>
        <input type="text" name="Description" id="des" /> <br><br>

        <button type="submit" id="addbtn">Add</button>
      </form>
    </div>

    <div class="list">
      <p style="text-align: center; font-size: 20px; ">List Todo:</p>
    </div>
  </body>
</html>
